<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>知行合一量化交易系统</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Fonts and icons -->
  <script src="../static/js/plugin/webfont/webfont.min.js"></script>
  <script>
    WebFont.load({
      google: { families: ["Public Sans:300,400,500,600,700"] },
      custom: {
        families: [
          "Font Awesome 5 Solid",
          "Font Awesome 5 Regular",
          "Font Awesome 5 Brands",
          "simple-line-icons",
        ],
        urls: ["../static/css/fonts.min.css"],
      },
      active: function () {
        sessionStorage.fonts = true;
      },
    });
  </script>

  <!-- 引入 Bootstrap CSS（全局样式） -->
  <link rel="stylesheet" href="../static/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../static/css/plugins.min.css" />
  <link rel="stylesheet" href="../static/css/kaiadmin.min.css" />
  <link rel="stylesheet" href="../static/css/app-extras.css" />
  <link rel="stylesheet" href="../static/css/app-tech.css" />
  <link rel="stylesheet" href="../static/css/app-dark-theme.css" />
  <script src="../static/js/core/jquery-3.7.1.min.js"></script>
  <script src="../static/js/sa-chart-theme.js"></script>
  <script src="../static/js/core/popper.min.js"></script>
  <script src="../static/js/core/bootstrap.min.js"></script>
  <script src="../static/js/plugin/jquery-scrollbar/jquery.scrollbar.min.js"></script>
  <script src="../static/js/plugin/chart.js/chart.min.js"></script>
  <script src="../static/js/plugin/jquery.sparkline/jquery.sparkline.min.js"></script>
  <script src="../static/js/plugin/chart-circle/circles.min.js"></script>
  <script src="../static/js/plugin/datatables/datatables.min.js"></script>
  <script src="../static/js/plugin/bootstrap-notify/bootstrap-notify.min.js"></script>
  <script src="../static/js/plugin/jsvectormap/jsvectormap.min.js"></script>
  <script src="../static/js/plugin/jsvectormap/world.js"></script>
  <script src="../static/js/plugin/sweetalert/sweetalert.min.js"></script>
  <script src="../static/js/kaiadmin.min.js"></script>

  <script type="text/javascript">
    // 初始化界面
    $(function () {
      
      // 判断是否登录
      $.get('/user/check_login', {},
        function (data) {
          if (data['login'] === true) {
            $('#username').text(data["username"]);
            if (data['is_admin'] === true) {
              $('#btn_admin_users').show();
            }
          } else {
            window.location.href = '/login'
          }
        }
      );

      // 退出登录
      $("#logout").click(function () {
        $.get('/user/logout', {},
          function (data) {
            alert(data['info']);
            if (data['success'] === true) {
              window.location.href = '/login'
            }
          }
        );
      });
       
    });
  </script>
</head>

<body class="sa-dark-theme">
  <div class="wrapper">
    <!-- 侧边栏,dark 表示深色主题 -->
    <div class="sidebar" data-background-color="dark">
      <div class="sidebar-logo">
        <!-- 侧边栏顶部 Logo 区域。 -->
        <div class="logo-header" data-background-color="dark">
          <a href="/" class="logo">
            <span class="sa-brand-text" style="color: white;">知行合一</span>
          </a>
          <div class="nav-toggle">
            <button class="btn btn-toggle toggle-sidebar">
              <i class="gg-menu-right"></i>
            </button>
            <button class="btn btn-toggle sidenav-toggler">
              <i class="gg-menu-left"></i>
            </button>
          </div>
          <button class="topbar-toggler more">
            <i class="gg-more-vertical-alt"></i>
          </button>
        </div>
        <!-- End Logo Header -->
      </div>
      <div class="sidebar-wrapper scrollbar scrollbar-inner">
        <div class="sidebar-content">
          <ul class="nav nav-secondary">
            <li class="nav-item" id="li_1">
              <a href="/"><i class="fas fa-home"></i>
                <p>首页</p>
              </a>
            </li>

            <li class="nav-item" id="li_2">
              <a href="/dapan"><i class="fas fa-chart-line"></i>
                <p>大盘指数行情</p>
              </a>
            </li>

            <li class="nav-item" id="li_3">
              <a href="/stock_info"><i class="fas fa-microscope"></i>
                <p>个股量化分析</p>
              </a>
            </li>

            <li class="nav-item" id="li_4">
              <a href="/stock_recommend"><i class="fas fa-robot"></i>
                <p>大模型辅助选股</p>
              </a>
            </li>

            <li class="nav-item" id="li_5">
              <a href="/favorites"><i class="fas fa-bookmark"></i>
                <p>我的收藏</p>
              </a>
            </li>

            <li class="nav-item" id="li_6">
              <a href="/risk_control"><i class="fas fa-shield-alt"></i>
                <p>量化风控</p>
              </a>
            </li>

            <li class="nav-item" id="li_7">
              <a href="/quant_strategy"><i class="fas fa-chess"></i>
                <p>量化策略</p>
              </a>
            </li>

          </ul>

        </div>
      </div>
    </div>

    <div class="main-panel">
      <div class="main-header">

        <!-- Navbar Header -->
        <nav class="navbar navbar-header navbar-header-transparent navbar-expand-lg border-bottom">
          <div class="container-fluid">
            <nav class="navbar navbar-header-left navbar-expand-lg navbar-form nav-search p-0 d-none d-lg-flex">
              <h3 id="module_name"></h3>
            </nav>

            <ul class="navbar-nav topbar-nav ms-md-auto align-items-center">
              <li class="nav-item topbar-user dropdown hidden-caret">
                <span>
                  <span class="profile-username">
                    <span class="op-7">Hi,</span>
                    <span class="fw-bold" id="username"></span>
                  </span>
                </span>

                <span></span>
                <span class="profile">
                  <button type="button" class="btn btn-label btn-secondary me-2" id="btn_admin_users"
                    style="display:none" onclick="window.location.href='/admin_users'">用户管理</button>
                  <button class="btn" id="logout">退出</button>
                </span>

              </li>
            </ul>
          </div>
        </nav>
      </div>

      <div class="container">
        <div class="page-inner">
          {% block content %}
          {% endblock %}
        </div>
      </div>

    </div>

  </div>

</body>

</html>
