{% extends "layout.html" %}

{% block content %}
<script src="../static/js/echarts.js" charset='utf-8'></script>
<script src="../static/js/sa-kline-chart.js"></script>

<script type="text/javascript">
    var dapanChartHolder = { instance: null };
    var dapanCurrentIndex = '上证指数';
    var dapanCurrentPeriod = 'day';

    function loadDapanChart(index, period) {
        dapanCurrentIndex = index || dapanCurrentIndex;
        dapanCurrentPeriod = period || dapanCurrentPeriod;
        $.get('/api/search_stock_index/' + encodeURIComponent(dapanCurrentIndex), { period: dapanCurrentPeriod },
            function (data) {
                renderKlineChart('main1', data, dapanChartHolder);
            }
        );
    }

    $(function () {
        for (var i = 1; i <= 7; i++) {
            $('#li_' + i).attr('class', i === 2 ? 'nav-item active' : 'nav-item');
        }
        $('#module_name').text($('.nav-item.active').text());

        $('#myTab').find('li').each(function () {
            $(this).click(function () {
                $('#myTab .nav-item').removeClass('active');
                $(this).addClass('active');
                loadDapanChart($(this).text().trim(), dapanCurrentPeriod);
            });
        });

        $('.sa-period-btn').on('click', function () {
            $('.sa-period-btn').removeClass('active');
            $(this).addClass('active');
            dapanCurrentPeriod = $(this).data('period');
            loadDapanChart(dapanCurrentIndex, dapanCurrentPeriod);
        });

        $('#first').click();
    });
</script>

<div class="sa-page-shell">
    <div class="sa-hero sa-hero--compact">
        <h2><i class="fas fa-globe-asia sa-hero-icon"></i>大盘指数行情</h2>
        <p class="sa-hero-sub mb-0">切换指数与周期（日线 / 周线 / 季线），查看 K 线、成交量、均线（MA60 黄 / MA120 紫）与 KDJ 的 J 值（9,3,3）。</p>
    </div>

    <div class="card sa-card-soft mb-3">
        <div class="card-header"><i class="fas fa-list me-2 text-primary"></i>指数选择</div>
        <div class="card-body py-3">
            <ul id="myTab" class="nav nav-tabs sa-nav-tabs border-0 mb-3">
                <li class="nav-item active" id="first">
                    <span class="nav-link" data-bs-toggle="tab">上证指数</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab">中小板指</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab">沪深300</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab">中证1000</a>
                </li>
            </ul>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="text-muted small me-1">K 线周期</span>
                <div class="btn-group sa-period-group" role="group">
                    <button type="button" class="btn btn-sm btn-outline-primary sa-period-btn active" data-period="day">日线</button>
                    <button type="button" class="btn btn-sm btn-outline-primary sa-period-btn" data-period="week">周线</button>
                    <button type="button" class="btn btn-sm btn-outline-primary sa-period-btn" data-period="month">月线</button>
                    <button type="button" class="btn btn-sm btn-outline-primary sa-period-btn" data-period="quarter">季线</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card sa-card-soft">
        <div class="card-header"><i class="fas fa-chart-area me-2 text-primary"></i>K 线走势</div>
        <div class="card-body p-2 p-md-3">
            <div class="row">
                <div class="col-12 sa-chart-host sa-chart-host--kline" id="main1"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
